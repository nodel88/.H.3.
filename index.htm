  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: 'Inter', 'Helvetica Neue', 'Noto Sans SC', 'PingFang SC', system-ui, -apple-system, sans-serif;
      background: #e8ecf4;
      overflow-x: hidden;
      min-height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a2e;
      position: relative;
      cursor: default;
    }

    #waterCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .ambient-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50vw;
      height: 50vw;
      max-width: 800px;
      max-height: 800px;
      min-width: 300px;
      min-height: 300px;
      background: radial-gradient(circle,
          rgba(255, 255, 255, 0.4) 0%,
          rgba(255, 255, 255, 0.22) 35%,
          rgba(250, 251, 255, 0.1) 60%,
          transparent 75%);
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
      animation: ambientBreathe 10s ease-in-out infinite;
    }

    .ambient-glow-2 {
      position: fixed;
      top: 35%;
      left: 25%;
      transform: translate(-50%, -50%);
      width: 35vw;
      height: 35vw;
      max-width: 500px;
      max-height: 500px;
      min-width: 200px;
      min-height: 200px;
      background: radial-gradient(circle,
          rgba(255, 255, 255, 0.32) 0%,
          rgba(255, 255, 255, 0.15) 45%,
          transparent 70%);
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
      animation: ambientBreathe2 8s ease-in-out infinite;
    }

    @keyframes ambientBreathe {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.7;
      }
      50% {
        transform: translate(-50%, -50%) scale(1.3);
        opacity: 1;
      }
    }

    @keyframes ambientBreathe2 {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(1.05);
        opacity: 0.55;
      }
      50% {
        transform: translate(-50%, -50%) scale(0.85);
        opacity: 0.9;
      }
    }

    .main-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(1rem, 3vw, 2rem);
      max-width: 900px;
      width: 100%;
    }

    .content-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1.2rem, 2.5vw, 2rem);
      width: 100%;
      animation: contentElevate 7s ease-in-out infinite;
    }

    @keyframes contentElevate {
      0%,
      100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-5px);
      }
    }

    /* Logo 容器 */
    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: clamp(1.2rem, 2.5vw, 2rem);
    }

    .logo-img {
      height: clamp(120px, 20vw, 200px);
      width: auto;
      filter: drop-shadow(0 0 35px rgba(255, 255, 255, 0.8)) drop-shadow(0 0 60px rgba(255, 255, 255, 0.5));
      animation: logoSoftGlow 4s ease-in-out infinite;
    }

    @keyframes logoSoftGlow {
      0%,
      100% {
        filter: drop-shadow(0 0 35px rgba(255, 255, 255, 0.7)) drop-shadow(0 0 55px rgba(255, 255, 255, 0.4));
        opacity: 0.92;
      }
      50% {
        filter: drop-shadow(0 0 55px rgba(255, 255, 255, 0.95)) drop-shadow(0 0 85px rgba(255, 255, 255, 0.6));
        opacity: 1;
      }
    }

    /* 图标与文字对应网格 */
    .icon-text-grid {
      display: flex;
      gap: clamp(1rem, 2.5vw, 2rem);
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
      width: 100%;
    }

    .icon-text-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      min-width: clamp(60px, 10vw, 90px);
      animation: itemFloat 5s ease-in-out infinite;
    }

    .icon-text-item:nth-child(1) {
      animation-delay: 0s;
    }
    .icon-text-item:nth-child(2) {
      animation-delay: 0.25s;
    }
    .icon-text-item:nth-child(3) {
      animation-delay: 0.5s;
    }
    .icon-text-item:nth-child(4) {
      animation-delay: 0.75s;
    }
    .icon-text-item:nth-child(5) {
      animation-delay: 1s;
    }
    .icon-text-item:nth-child(6) {
      animation-delay: 1.25s;
    }

    @keyframes itemFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-5px);
      }
    }

    .item-icon {
      font-size: clamp(1.4rem, 2.8vw, 2.2rem);
      color: #3a3a60;
      opacity: 0.7;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6)) drop-shadow(0 0 18px rgba(255, 255, 255, 0.35));
      transition: all 0.5s ease;
    }

    .item-chinese {
      font-size: clamp(0.85rem, 1.8vw, 1.3rem);
      font-weight: 400;
      color: #1a1a35;
      letter-spacing: 0.15em;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    }

    .item-english {
      font-size: clamp(0.35rem, 0.7vw, 0.5rem);
      font-weight: 400;
      color: #4a4a65;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
    }

    /* 通知区域 - 放大一号 */
    .notice-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(0.5rem, 1vw, 0.8rem);
      width: 100%;
    }

    .notice-cn {
      font-size: clamp(0.55rem, 1.2vw, 0.82rem);
      font-weight: 400;
      color: #2a2a42;
      letter-spacing: 0.12em;
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.25);
      width: 100%;
			margin-top: 6.6rem;
			margin-bottom: 0.1rem;
    }

    .notice-en {
      font-size: clamp(0.4rem, 0.85vw, 0.58rem);
      font-weight: 400;
      color: #4a4a65;
      letter-spacing: 0.08em;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.45), 0 0 15px rgba(255, 255, 255, 0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    /* 加载点 */
    .loading-dots {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      align-items: center;
      margin: 0.8rem 0 0.5rem;
      width: 100%;
    }

    .dot {
      width: clamp(6px, 1vw, 9px);
      height: clamp(6px, 1vw, 9px);
      background: #4a4a72;
      border-radius: 50%;
      animation: dotEthereal 2s ease-in-out infinite;
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.55), 0 0 25px rgba(255, 255, 255, 0.3);
    }

    .dot:nth-child(2) {
      animation-delay: 0.25s;
    }
    .dot:nth-child(3) {
      animation-delay: 0.5s;
    }
    .dot:nth-child(4) {
      animation-delay: 0.75s;
    }
    .dot:nth-child(5) {
      animation-delay: 1s;
    }

    @keyframes dotEthereal {
      0%,
      80%,
      100% {
        transform: scale(0.5);
        opacity: 0.35;
        background: #3a3a62;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.4), 0 0 18px rgba(255, 255, 255, 0.2);
      }
      40% {
        transform: scale(1.5);
        opacity: 0.95;
        background: #2a2a50;
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.75), 0 0 45px rgba(255, 255, 255, 0.45);
      }
    }

    /* 联系邮箱 */
    .contact-email {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      width: 100%;
	  margin-top: 6.6rem;
      padding: clamp(0.6rem, 1vw, 0.8rem) 0;
    }

    .contact-email a {
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      font-weight: 400;
      color: #3a3a58;
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.45), 0 0 15px rgba(255, 255, 255, 0.2);
    }

    .contact-email a:hover {
      color: #1a1a35;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.7), 0 0 30px rgba(255, 255, 255, 0.4);
    }

    .contact-email i {
      font-size: clamp(0.65rem, 1.3vw, 0.85rem);
      opacity: 0.75;
      color: #4a4a68;
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
    }

    /* 底部版权 */
    .footer-copyright {
      margin-top: clamp(0.8rem, 1.5vw, 1.2rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      color: #5a5a78;
      font-size: clamp(0.6rem, 1.2vw, 0.8rem);
      letter-spacing: 0.08em;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.4), 0 0 15px rgba(255, 255, 255, 0.2);
      padding-top: clamp(0.8rem, 1.5vw, 1.2rem);
      width: 100%;
    }

    .footer-copyright .brand {
      font-weight: 600;
      color: #3a3a58;
      letter-spacing: 0.1em;
    }

    .footer-copyright .year {
      font-weight: 400;
      color: #4a4a68;
      font-size: clamp(0.7rem, 1.4vw, 0.95rem);
      letter-spacing: 0.12em;
    }

    @media (max-width: 600px) {
      .content-wrapper {
        gap: 1rem;
      }
      .icon-text-grid {
        gap: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="waterCanvas"></canvas>
  <div class="ambient-glow"></div>
  <div class="ambient-glow-2"></div>

  <div class="main-content">
    <div class="content-wrapper">
      <!-- Logo -->
      <div class="logo-container">
        <img src="https://hci.cn/hci-logo.svg" alt="HCI Logo" class="logo-img" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'width:clamp(120px,20vw,200px);height:clamp(120px,20vw,200px);border-radius:50%;background:#1a1a35;display:flex;align-items:center;justify-content:center;box-shadow:0 0 55px rgba(255,255,255,0.8);\'><span style=\'font-family:Inter,PingFang SC,sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:600;letter-spacing:0.12em;color:#e8ecf8;\'>HCI</span></div>';">
      </div>

      <!-- 图标与中英文一一对应 -->
      <div class="icon-text-grid">
        <!-- 衣 - Clothing -->
        <div class="icon-text-item">
          <i class="fas fa-tshirt item-icon"></i>
          <span class="item-chinese">衣</span>
          <span class="item-english">Clothing</span>
        </div>

        <!-- 食 - Food -->
        <div class="icon-text-item">
          <i class="fas fa-utensils item-icon"></i>
          <span class="item-chinese">食</span>
          <span class="item-english">Food</span>
        </div>

        <!-- 住 - Housing -->
        <div class="icon-text-item">
          <i class="fas fa-home item-icon"></i>
          <span class="item-chinese">住</span>
          <span class="item-english">Housing</span>
        </div>

        <!-- 行 - Transportation -->
        <div class="icon-text-item">
          <i class="fas fa-car item-icon"></i>
          <span class="item-chinese">行</span>
          <span class="item-english">Transportation</span>
        </div>

        <!-- 乐 - Entertainment -->
        <div class="icon-text-item">
          <i class="fas fa-music item-icon"></i>
          <span class="item-chinese">乐</span>
          <span class="item-english">Entertainment</span>
        </div>

        <!-- 游 - Game -->
        <div class="icon-text-item">
          <i class="fas fa-gamepad item-icon"></i>
          <span class="item-chinese">游</span>
          <span class="item-english">Game</span>
        </div>
      </div>

      <!-- 即将上线通知 - 放大一号 -->
      <div class="notice-section">
        <div class="notice-cn">
          新网站即将上线，敬请期待！
        </div>
        <div class="notice-en">
          The new website is coming soon, Stay tuned!
        </div>
      </div>

      <!-- 动态加载点 -->
      <div class="loading-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <!-- 联系邮箱 -->
      <div class="contact-email">
        <a href="mailto:hci.cn@hotmail.com">
          <i class="fas fa-envelope"></i>
          hci.cn@hotmail.com
        </a>
      </div>

      <!-- 底部版权信息 -->
      <div class="footer-copyright">
        <span class="brand">Copyright © HCI</span>
        <span class="year">2026</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const waterCanvas = document.getElementById('waterCanvas');
      const wCtx = waterCanvas.getContext('2d');
      let wWidth, wHeight;
      let waterTime = 0;

      const waveSources = [
        { x: 0.25, y: 0.3, amplitude: 45, frequency: 0.018, speed: 0.6, phase: 0, radius: 350 },
        { x: 0.7, y: 0.55, amplitude: 38, frequency: 0.022, speed: 0.5, phase: 2.1, radius: 320 },
        { x: 0.5, y: 0.7, amplitude: 50, frequency: 0.015, speed: 0.55, phase: 4.3, radius: 380 },
        { x: 0.15, y: 0.7, amplitude: 32, frequency: 0.025, speed: 0.48, phase: 1.5, radius: 280 },
        { x: 0.8, y: 0.25, amplitude: 40, frequency: 0.02, speed: 0.52, phase: 5.8, radius: 300 },
      ];

      function resizeWaterCanvas() {
        wWidth = window.innerWidth;
        wHeight = window.innerHeight;
        waterCanvas.width = wWidth;
        waterCanvas.height = wHeight;
      }

      function drawWaterBackground(time) {
        wCtx.clearRect(0, 0, wWidth, wHeight);

        const baseGrad = wCtx.createLinearGradient(0, 0, wWidth, wHeight);
        baseGrad.addColorStop(0, '#e2e8f6');
        baseGrad.addColorStop(0.35, '#ecf0f8');
        baseGrad.addColorStop(0.65, '#e8ecf5');
        baseGrad.addColorStop(1, '#dee4f2');
        wCtx.fillStyle = baseGrad;
        wCtx.fillRect(0, 0, wWidth, wHeight);

        for (let i = 0; i < waveSources.length; i++) {
          const ws = waveSources[i];
          const cx = ws.x * wWidth;
          const cy = ws.y * wHeight;
          const currentPhase = ws.phase + time * 0.001 * ws.speed;

          const maxRings = 14;
          for (let ring = 0; ring < maxRings; ring++) {
            const baseRadius = (ring + 1) * (ws.radius / maxRings);
            const ripple = Math.sin(baseRadius * ws.frequency - currentPhase + ring * 0.8) * ws.amplitude * 0.5;
            const radius = baseRadius + ripple;

            const alpha = Math.max(0, 0.09 - ring * 0.006);
            const hue = 215 + ring * 3;
            const saturation = 35 + ring * 2;
            const lightness = 78 - ring * 1.5;

            wCtx.beginPath();
            wCtx.arc(cx, cy, radius, 0, Math.PI * 2);
            wCtx.strokeStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
            wCtx.lineWidth = 1.3;
            wCtx.stroke();

            if (ring < 5) {
              wCtx.beginPath();
              wCtx.arc(cx, cy, radius * 0.7, 0, Math.PI * 2);
              wCtx.strokeStyle = `hsla(${hue}, ${saturation + 10}%, ${lightness + 8}%, ${alpha * 1.5})`;
              wCtx.lineWidth = 0.9;
              wCtx.stroke();
            }
          }

          const centerGlow = wCtx.createRadialGradient(cx, cy, 0, cx, cy, 80);
          centerGlow.addColorStop(0, 'rgba(255, 255, 255, 0.5)');
          centerGlow.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
          centerGlow.addColorStop(1, 'rgba(250, 251, 255, 0)');
          wCtx.fillStyle = centerGlow;
          wCtx.beginPath();
          wCtx.arc(cx, cy, 90, 0, Math.PI * 2);
          wCtx.fill();
        }

        for (let y = 0; y < wHeight; y += 18) {
          const yPhase = y * 0.02 + time * 0.0008;
          const offset = Math.sin(yPhase) * 4 + Math.cos(y * 0.01 + time * 0.0005) * 3;
          wCtx.beginPath();
          wCtx.moveTo(0, y + offset);
          for (let x = 0; x < wWidth; x += 25) {
            const xPhase = x * 0.015 + time * 0.0006;
            const yOffset = Math.sin(xPhase + y * 0.008) * 3;
            wCtx.lineTo(x, y + offset + yOffset);
          }
          wCtx.strokeStyle = 'rgba(255, 255, 255, 0.14)';
          wCtx.lineWidth = 0.6;
          wCtx.stroke();
        }
      }

      function animate(timestamp) {
        waterTime = timestamp;
        drawWaterBackground(waterTime);
        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', () => {
        resizeWaterCanvas();
      });

      window.addEventListener('mousemove', (e) => {
        const mx = e.clientX / window.innerWidth;
        const my = e.clientY / window.innerHeight;
        let closestIdx = 0;
        let closestDist = Infinity;
        for (let i = 0; i < waveSources.length; i++) {
          const dx = waveSources[i].x - mx;
          const dy = waveSources[i].y - my;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < closestDist) {
            closestDist = dist;
            closestIdx = i;
          }
        }
        if (closestDist < 0.3) {
          waveSources[closestIdx].x += (mx - waveSources[closestIdx].x) * 0.02;
          waveSources[closestIdx].y += (my - waveSources[closestIdx].y) * 0.02;
        }
      });

      window.addEventListener('click', (e) => {
        const cx = e.clientX / window.innerWidth;
        const cy = e.clientY / window.innerHeight;
        waveSources.push({
          x: cx,
          y: cy,
          amplitude: 65,
          frequency: 0.03,
          speed: 0.8,
          phase: Math.random() * Math.PI * 2,
          radius: 220,
        });
        if (waveSources.length > 8) {
          waveSources.shift();
        }
      });

      resizeWaterCanvas();
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
